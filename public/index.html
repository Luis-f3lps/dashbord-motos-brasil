<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de Vendas - Motos</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>
    <div class="container">
        <nav class="sidebar" id="sidemenu">
            <div class="logo"><span>Painel Motos</span></div>
            <ul class="nav-links">
                <li class="active"><a href="#topo"><i class="fas fa-motorcycle"></i> <span>Dashboard</span></a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header" id="topo">
                <div class="header-left">
                    <div class="breadcrumb"><i class="fas fa-home"></i> / Dashboard / Vendas</div>
                    <p id="contadorRegistros" style="font-weight: bold; color: #4caf50;">Carregando dados...</p>
                </div>
            </header>

            <section class="dashboard-grid">
                
                <!-- DIV 1: Tipo da Moto + Mês/Ano + Gráfico + Lista ao lado (sem motor) -->
                <div class="card wide">
                    <h3>Análise por Tipo e Mês/Ano</h3>
                    <div class="filtros-container">
                        <select id="filtroTipoSec1">
                            <option value="">Selecione o Tipo (ex: City)</option>
                        </select>
                        <select id="filtroDataSec1">
                            <option value="">Selecione o Mês/Ano</option>
                        </select>
                    </div>
                    <div class="flex-row">
                        <div class="flex-col" style="position: relative; height:350px;">
                            <canvas id="graficoTipoMes"></canvas>
                        </div>
                        <div class="flex-col">
                            <h4>Informações das Motos (Sem Motor)</h4>
                            <div class="lista-motos-container" id="listaMotosSec1">
                                <p style="color: #888;">Selecione o tipo e o mês/ano acima.</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- DIV 2: Evolução porcentagem de fabricante por mês ano com intervalo de período -->
                <div class="card wide">
                    <h3>Evolução de Participação (%) por Fabricante (Mês/Ano)</h3>
                    <div class="filtros-container">
                        <div>
                            <label style="font-size: 12px; display:block;">De (Mês/Ano):</label>
                            <select id="filtroDataInicio">
                                <option value="">Início</option>
                            </select>
                        </div>
                        <div>
                            <label style="font-size: 12px; display:block;">Até (Mês/Ano):</label>
                            <select id="filtroDataFim">
                                <option value="">Fim</option>
                            </select>
                        </div>
                    </div>
                    <div class="chart-container" style="position: relative; height:40vh; width:100%">
                        <canvas id="graficoEvolucaoPercentual"></canvas>
                    </div>
                </div>

                <!-- DIV 3: Vendas por Fabricante (Dados Totais) com select por período -->
                <div class="card wide">
                    <h3>Vendas por Fabricante (Dados Totais)</h3>
                    <div class="filtros-container">
                        <select id="filtroPeriodoFabricante">
                            <option value="">Todos os Períodos</option>
                        </select>
                    </div>
                    <div class="chart-container" style="position: relative; height:35vh;"><canvas id="graficoVendasFabricanteTotais"></canvas></div>
                </div>

                <!-- DIV 4: Gráfico Modelos Vendidos por Mês/Ano -->
                <div class="card wide">
                    <h3>Modelos Vendidos por Mês / Ano</h3>
                    <div class="filtros-container">
                        <select id="filtroModeloMesAno">
                            <option value="">Todos os Meses/Anos</option>
                        </select>
                    </div>
                    <div class="chart-container" style="position: relative; height:40vh; width:100%">
                        <canvas id="graficoModelosMesAno"></canvas>
                    </div>
                </div>

            </section>
        </main>
    </div>
    <script src="/js/index.js"></script>
</body>

</html>
