<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard de Vendas - Motos</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .filtros-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .filtros-container select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ddd;
            flex: 1;
            min-width: 150px;
        }
    </style>
</head>

<body>
    <div class="container">
        <nav class="sidebar" id="sidemenu">
            <div class="logo"><span>Painel Motos</span></div>
            <ul class="nav-links">
                <li class="active"><a href="#topo"><i class="fas fa-motorcycle"></i> <span>Dashboard</span></a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header" id="topo">
                <div class="header-left">
                    <div class="breadcrumb"><i class="fas fa-home"></i> / Dashboard / Vendas</div>
                    <p id="contadorRegistros" style="font-weight: bold; color: #4caf50;">Carregando dados...</p>
                </div>
            </header>

            <section class="dashboard-grid">
                <div class="card wide">
                    <h3>Filtros de Pesquisa</h3>
                    <div class="filtros-container">
                        <select id="filtroFabricante">
                            <option value="">Todos os Fabricantes</option>
                        </select>
                        <select id="filtroTipo">
                            <option value="">Todos os Tipos</option>
                        </select>
                        <select id="filtroMotor">
                            <option value="">Todos os Motores</option>
                        </select>
                        <select id="filtroData">
                            <option value="">Todos os Meses/Anos</option>
                        </select>
                    </div>
                </div>

                <div class="card wide">
                    <h3>Evolução de Vendas (%) por Fabricante/Ano</h3>
                    <div class="chart-container" style="position: relative; height:40vh; width:100%">
                        <canvas id="graficoLinhaTendencia"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h3>Vendas por Fabricante (Totais)</h3>
                    <div class="chart-container" style="position: relative; height:30vh;"><canvas id="graficoRoscaMarca"></canvas></div>
                </div>

                <div class="card">
                    <h3>Vendas por Tipo de Motor</h3>
                    <div class="chart-container" style="position: relative; height:30vh;"><canvas id="graficoRoscaMotor"></canvas></div>
                </div>

                <div class="card">
                    <h3>Vendas por Modelo</h3>
                    <div class="chart-container" style="position: relative; height:30vh;"><canvas id="graficoRoscaModelo"></canvas></div>
                </div>

                <div class="card wide">
                    <h3>Evolução Mensal de Vendas (Totais)</h3>
                    <div class="chart-container" style="position: relative; height:40vh; width:100%"><canvas id="graficoLinhaMensal"></canvas></div>
                </div>

                <div class="card wide">
                    <h3>Comparativo Anual por Fabricante</h3>
                    <div class="chart-container" style="position: relative; height:40vh; width:100%"><canvas id="graficoBarraAnual"></canvas></div>
                </div>
            </section>
        </main>
    </div>
    <script src="/js/index.js"></script>
</body>

</html>
